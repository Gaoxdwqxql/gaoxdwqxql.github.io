<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 · 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f4f7fb 0%, #e9eef3 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 主容器：直角，无任何圆角 */
        .error-container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            padding: 2.2rem 2.5rem 2.8rem 2.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.02);
            text-align: center;
            transition: transform 0.2s ease;
            border: 1px solid #e2e8f0;
            border-radius: 0px;
            position: relative;
        }

        .error-container:hover {
            transform: translateY(-3px);
        }

        /* 语言切换器 — 直角且无表情 */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        .lang-btn {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4b5c72;
            cursor: pointer;
            padding: 0.25rem 0.6rem;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            border-radius: 0px;
            font-family: inherit;
        }
        .lang-btn:hover {
            color: #0f1722;
            background: #f1f5f9;
        }
        .lang-btn:active {
            transform: translateY(1px);
        }

        /* 404 数字现代渐变 */
        .error-code {
            font-size: 8.5rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(120deg, #1e2a3e, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            animation: subtleGlide 3s ease-in-out infinite;
        }

        @keyframes subtleGlide {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            color: #0f1722;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .error-message {
            font-size: 1rem;
            color: #2d3a4b;
            line-height: 1.5;
            max-width: 480px;
            margin: 0 auto 2rem auto;
            border-left: 3px solid #9aaebf;
            padding-left: 1.2rem;
            text-align: left;
        }

        /* 主页按钮：直角，无圆角，干净现代 */
        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: #111827;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.85rem 2rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            border-radius: 0px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .home-button:hover {
            background: #1f2a3e;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px -8px rgba(0,0,0,0.2);
        }

        .home-button:active {
            transform: translateY(1px);
        }

        /* 建议区域 (直角标签) */
        .suggestion {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #4b5c72;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.4rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .suggestion span {
            background: #f1f5f9;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            font-weight: 450;
            letter-spacing: 0.01em;
            border-radius: 0px;
            color: #1e2f41;
        }

        /* 版权信息：直角极简 */
        .copyright {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #6a7b8c;
            border-top: none;
            text-align: center;
            letter-spacing: 0.3px;
            padding-top: 0.5rem;
        }

        /* 响应式保持直角 */
        @media (max-width: 560px) {
            .error-container {
                padding: 1.6rem 1.5rem 2rem 1.5rem;
            }
            .error-code {
                font-size: 5.2rem;
            }
            .error-title {
                font-size: 1.6rem;
            }
            .error-message {
                font-size: 0.9rem;
                padding-left: 0.9rem;
            }
            .home-button {
                padding: 0.7rem 1.6rem;
                font-size: 0.9rem;
            }
            .suggestion span {
                font-size: 0.7rem;
                padding: 0.2rem 0.8rem;
            }
        }

        /* 淡入动画 */
        .fade-in {
            animation: fadeUp 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 全局强制无圆角 (防止任何意外) */
        button, a, div, span, .error-container, .home-button, .suggestion span, .lang-btn {
            border-radius: 0px !important;
        }
    </style>
</head>
<body>
<div class="error-container fade-in">
    <!-- 语言切换区域 (无emoji 直角) -->
    <div class="lang-switch">
        <button id="langToggleBtn" class="lang-btn">English</button>
    </div>

    <div class="error-code">404</div>
    <h1 id="errorTitle" class="error-title">页面未找到</h1>
    <div id="errorMessage" class="error-message">
        你访问的页面不存在，可能是链接失效或者地址输入有误。<br>
        返回首页继续浏览，或检查网址拼写。
    </div>
    <a href="/" class="home-button" aria-label="返回主页">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 21 9 13 15 13 15 21"/>
        </svg>
        <span id="homeBtnText">返回首页</span>
    </a>
    <div class="suggestion">
        <span id="suggestSpell">检查网址拼写</span>
        <span id="suggestHome">gaoxdwqxql.github.io 主页</span>
    </div>
    <div id="copyright" class="copyright">© Gaoxdwqxql</div>
</div>

<script>
    (function() {
        // 语言资源库 (无任何emoji)
        const translations = {
            zh: {
                title: "页面未找到",
                message: "你访问的页面不存在，可能是链接失效或者地址输入有误。<br>返回首页继续浏览，或检查网址拼写。",
                homeBtn: "返回首页",
                suggestSpell: "检查网址拼写",
                suggestHome: "gaoxdwqxql.github.io 主页",
                copyright: "© Gaoxdwqxql",
                langToggleNext: "English",
                htmlLang: "zh-CN",
                docTitle: "404 · 页面未找到"
            },
            en: {
                title: "Page Not Found",
                message: "The page you are looking for does not exist. It might have been removed, or the link is broken.<br>Return to the homepage or double-check the URL.",
                homeBtn: "Back to Home",
                suggestSpell: "Check URL spelling",
                suggestHome: "gaoxdwqxql.github.io Homepage",
                copyright: "© Gaoxdwqxql",
                langToggleNext: "中文",
                htmlLang: "en",
                docTitle: "404 · Page Not Found"
            }
        };

        let currentLang = 'zh';   // 默认中文

        // 获取需要更新的元素
        const titleEl = document.getElementById('errorTitle');
        const msgEl = document.getElementById('errorMessage');
        const homeBtnSpan = document.getElementById('homeBtnText');
        const suggestSpellEl = document.getElementById('suggestSpell');
        const suggestHomeEl = document.getElementById('suggestHome');
        const copyrightEl = document.getElementById('copyright');
        const toggleBtn = document.getElementById('langToggleBtn');
        const htmlElement = document.documentElement;

        // 更新页面所有文本 (包括语言切换按钮文案和页面lang属性)
        function updateLanguage(lang) {
            const t = translations[lang];
            if (!t) return;

            // 更新内容
            if (titleEl) titleEl.innerText = t.title;
            if (msgEl) msgEl.innerHTML = t.message;   // 保留换行 <br>
            if (homeBtnSpan) homeBtnSpan.innerText = t.homeBtn;
            if (suggestSpellEl) suggestSpellEl.innerText = t.suggestSpell;
            if (suggestHomeEl) suggestHomeEl.innerText = t.suggestHome;
            if (copyrightEl) copyrightEl.innerText = t.copyright;
            if (toggleBtn) toggleBtn.innerText = t.langToggleNext;
            // 更新 html 语言属性
            if (htmlElement) htmlElement.setAttribute('lang', t.htmlLang);
            // 更新浏览器标签页标题
            document.title = t.docTitle;

            // 保存当前语言到 localStorage (让用户偏好持久化)
            localStorage.setItem('gaoxdw_404_lang', lang);
        }

        // 切换中英文
        function toggleLanguage() {
            if (currentLang === 'zh') {
                currentLang = 'en';
            } else {
                currentLang = 'zh';
            }
            updateLanguage(currentLang);
        }

        // 初始化：读取本地存储的语言偏好，若无则默认为中文
        function initLanguage() {
            const savedLang = localStorage.getItem('gaoxdw_404_lang');
            if (savedLang === 'en' || savedLang === 'zh') {
                currentLang = savedLang;
            } else {
                currentLang = 'zh';   // 默认中文
            }
            updateLanguage(currentLang);
        }

        // 绑定切换按钮事件
        if (toggleBtn) {
            toggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                toggleLanguage();
            });
        }

        // 启动初始化
        initLanguage();
    })();
</script>
</body>
</html>
